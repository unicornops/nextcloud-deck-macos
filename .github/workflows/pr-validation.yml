name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pmd:
    name: PMD Static Analysis
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PMD
        run: brew install pmd

      # NOTE: `pmd check` (static analysis) is intentionally omitted.
      # PMD's Swift grammar predates Swift 5.9 and cannot parse existential
      # types (any Encodable), if/switch expressions, or async/await signatures
      # — all of which are used throughout this codebase. Running `pmd check`
      # produces dozens of spurious ANTLR parse warnings and an NPE in the
      # UnavailableFunction rule. See pmd-ruleset.xml for full details and the
      # commented-out rule references to re-enable when PMD's grammar catches up.

      - name: Run PMD CPD (copy-paste detection)
        run: |
          pmd cpd \
            --minimum-tokens 105 \
            --dir NextcloudDeck \
            --language swift \
            --format text \
            --fail-on-violation \
            --report-file cpd-report.txt || CPD_EXIT=$?

          if [ -f cpd-report.txt ] && [ -s cpd-report.txt ]; then
            echo "### CPD duplications found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cpd-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cpd-report.txt
          fi

          exit ${CPD_EXIT:-0}

      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pmd-reports
          path: cpd-report.txt
          if-no-files-found: ignore

  build:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -td /Applications/Xcode_*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show build environment
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version
          echo ""
          echo "macOS version:"
          sw_vers

      - name: Validate project structure
        run: |
          echo "Checking project file..."
          if [ ! -f "NextcloudDeck.xcodeproj/project.pbxproj" ]; then
            echo "❌ Project file not found"
            exit 1
          fi
          echo "✓ Project file exists"

      - name: Check Swift syntax
        run: |
          echo "Checking Swift files for syntax errors..."
          find NextcloudDeck -name "*.swift" -type f | while read file; do
            echo "Checking: $file"
            if ! swift -frontend -parse "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              swift -frontend -parse "$file"
              exit 1
            fi
          done
          echo "✓ All Swift files have valid syntax"

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project NextcloudDeck.xcodeproj \
            -scheme NextcloudDeck \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            GIT_COMMIT_HASH="${{ github.sha }}" \
            BUILD_REF="${{ github.sha }}" \
            BUILD_DATE_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Build (Release - Unsigned)
        run: |
          xcodebuild \
            -project NextcloudDeck.xcodeproj \
            -scheme NextcloudDeck \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            GIT_COMMIT_HASH="${{ github.sha }}" \
            BUILD_REF="${{ github.sha }}" \
            BUILD_DATE_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Find built app
        id: find-app
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products -name "NextcloudDeck.app" -type d | head -n 1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Verify app bundle
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"

          if [ ! -d "$APP_PATH" ]; then
            echo "✗ App bundle not found"
            exit 1
          fi

          echo "✓ App bundle exists"

          if [ ! -f "$APP_PATH/Contents/MacOS/NextcloudDeck" ]; then
            echo "✗ Executable not found"
            exit 1
          fi
          echo "✓ Executable found"

          if [ ! -f "$APP_PATH/Contents/Info.plist" ]; then
            echo "✗ Info.plist not found"
            exit 1
          fi
          echo "✓ Info.plist found"

      - name: PR validation summary
        if: always()
        run: |
          echo "## PR Validation Summary ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Swift Syntax**: Validated" >> $GITHUB_STEP_SUMMARY
          echo "- **Build (Debug)**: Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Build (Release)**: Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Xcode**: $(xcodebuild -version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Swift**: $(swift --version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- **macOS**: $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: This is an unsigned build. Signed builds are only created on release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **PMD CPD (copy-paste detection) results**: see the 'PMD Static Analysis' job above." >> $GITHUB_STEP_SUMMARY
