name: Build and Attach Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  SCHEME: NextcloudDeck
  PROJECT: NextcloudDeck.xcodeproj
  APP_NAME: NextcloudDeck

jobs:
  build-and-release:
    name: Build and Upload Release Assets
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -td /Applications/Xcode_*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show build environment
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version

      - name: Install icon generation dependency
        run: brew install librsvg

      - name: Generate app icon
        run: ./generate-appicon.sh

      - name: Set version for artifacts
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_SUFFIX="${VERSION#v}"
          echo "version_suffix=$VERSION_SUFFIX" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION_SUFFIX"

      - name: Setup code signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="temporary_password_$(uuidgen)"
          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | sed s/\"//g)

          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_NAME" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep "Developer ID Application" | head -1 | sed -n 's/.*"\(.*\)"/\1/p')
          if [ -z "$IDENTITY" ]; then
            echo "Error: No Developer ID Application certificate found"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "CERT_TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "✅ Code signing certificate installed"

      - name: Build and sign
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$CERT_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            clean build

      - name: Find built app
        id: find-app
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products -name "${{ env.APP_NAME }}.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: ${{ env.APP_NAME }}.app not found"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Verify code signature
        run: |
          codesign -vvv --deep --strict "${{ steps.find-app.outputs.app_path }}"
          codesign -dvvv "${{ steps.find-app.outputs.app_path }}"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          ditto -c -k --keepParent "$APP_PATH" NotarizeApp.zip
          xcrun notarytool submit NotarizeApp.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait --timeout 30m
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm NotarizeApp.zip
          echo "✅ App notarized and stapled"

      - name: Create DMG
        id: create-dmg
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version_suffix }}"
          DMG_NAME="${{ env.APP_NAME }}-${VERSION}.dmg"
          VOLUME_NAME="Nextcloud Deck ${VERSION}"
          ./create-dmg.sh "$APP_PATH" "$DMG_NAME" "$VOLUME_NAME"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
          ls -lh "$DMG_NAME"

      - name: Create ZIP archive
        id: create-zip
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version_suffix }}"
          ZIP_NAME="${{ env.APP_NAME }}-${VERSION}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✓ ZIP created: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Calculate checksums
        run: |
          DMG_NAME="${{ steps.create-dmg.outputs.dmg_name }}"
          ZIP_NAME="${{ steps.create-zip.outputs.zip_name }}"
          shasum -a 256 "$DMG_NAME" "$ZIP_NAME" > checksums.txt
          cat checksums.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.create-dmg.outputs.dmg_name }}
            ${{ steps.create-zip.outputs.zip_name }}
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release build summary
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **DMG**: ${{ steps.create-dmg.outputs.dmg_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ZIP**: ${{ steps.create-zip.outputs.zip_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Assets attached to [release ${{ github.event.release.tag_name }}](${{ github.event.release.html_url }})." >> $GITHUB_STEP_SUMMARY
