name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g., v1.2.3) - skips release-please and runs build only"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.sha }}
  cancel-in-progress: false

env:
  SCHEME: NextcloudDeck
  PROJECT: NextcloudDeck.xcodeproj
  APP_NAME: NextcloudDeck

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build and Publish Release
    runs-on: macos-latest
    needs: release-please
    if: |
      always() &&
      (needs.release-please.outputs.releases_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}

      - name: Set version
        id: version
        run: |
          TAG="${{ needs.release-please.outputs.tag_name || inputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Show build environment
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version
          echo ""
          echo "macOS version:"
          sw_vers

      - name: Install icon generation dependency
        run: brew install librsvg

      - name: Generate app icon
        run: ./generate-appicon.sh

      - name: Clean build directory
        run: rm -rf build/

      - name: Setup code signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="temporary_password_$(uuidgen)"
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          echo "Creating temporary keychain..."
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          echo "Configuring keychain settings..."
          security set-keychain-settings "$KEYCHAIN_NAME"

          echo "Unlocking keychain..."
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          echo "Adding to keychain search list..."
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | sed s/\"//g)

          echo "Importing certificate..."
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          if [ ! -f "$CERTIFICATE_PATH" ]; then
            echo "Error: Certificate file was not created"
            exit 1
          fi

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_NAME" \
            -T /usr/bin/codesign \
            -T /usr/bin/security || {
              echo "Error: Certificate import failed"
              exit 1
            }

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          IDENTITY_COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep -c "Developer ID Application" || echo "0")
          if [ "$IDENTITY_COUNT" -eq "0" ]; then
            echo "Error: No Developer ID Application certificate found after import"
            exit 1
          fi

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep "Developer ID Application" | head -1 | sed -n 's/.*"\(.*\)"/\1/p')
          CERT_TEAM_ID=$(echo "$IDENTITY" | sed -n 's/.*(\([^)]*\)).*/\1/p')
          if [ -z "$CERT_TEAM_ID" ]; then
            CERT_TEAM_ID="$TEAM_ID"
          fi

          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "CERT_TEAM_ID=$CERT_TEAM_ID" >> $GITHUB_ENV
          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          echo "✅ Code signing certificate installed"

      - name: Build and sign release
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$CERT_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME --options runtime --timestamp" \
            build

      - name: Find built app
        id: find-app
        run: |
          APP_PATH=$(find build -name "${{ env.APP_NAME }}.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: ${{ env.APP_NAME }}.app not found in build directory"
            exit 1
          fi
          APP_PATH=$(cd "$(dirname "$APP_PATH")" && pwd)/$(basename "$APP_PATH")
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Verify app bundle
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          if [ ! -f "$APP_PATH/Contents/MacOS/${{ env.APP_NAME }}" ]; then
            echo "Error: Executable not found"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Contents/Info.plist" ]; then
            echo "Error: Info.plist not found"
            exit 1
          fi
          echo "✓ App bundle verification successful"

      - name: Verify code signature
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          codesign -vvv --deep --strict "$APP_PATH"
          codesign -dvvv "$APP_PATH"
          echo "✅ Code signature verification successful"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"

          echo "Creating ZIP for notarization..."
          ditto -c -k --keepParent "$APP_PATH" NotarizeApp.zip

          echo "Submitting to Apple for notarization..."
          xcrun notarytool submit NotarizeApp.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait \
            --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"

          echo "Verifying notarization..."
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv "$APP_PATH"

          rm NotarizeApp.zip
          echo "✅ App successfully notarized and stapled"

      - name: Get app info
        id: app-info
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST_PATH")
          BUNDLE_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST_PATH")
          echo "bundle_version=$BUNDLE_VERSION" >> $GITHUB_OUTPUT
          echo "bundle_build=$BUNDLE_BUILD" >> $GITHUB_OUTPUT

      - name: Create DMG
        id: create-dmg
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${{ env.APP_NAME }}-${VERSION}.dmg"
          VOLUME_NAME="Nextcloud Deck ${VERSION}"

          ./create-dmg.sh "$APP_PATH" "$DMG_NAME" "$VOLUME_NAME"

          if [ -f "$DMG_NAME" ]; then
            echo "✓ DMG created successfully: $DMG_NAME"
            ls -lh "$DMG_NAME"
          else
            echo "✗ DMG creation failed"
            exit 1
          fi

          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        id: create-zip
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ env.APP_NAME }}-${VERSION}.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"

          if [ -f "$ZIP_NAME" ]; then
            echo "✓ ZIP created successfully: $ZIP_NAME"
            ls -lh "$ZIP_NAME"
          else
            echo "✗ ZIP creation failed"
            exit 1
          fi

          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Calculate checksums
        run: |
          DMG_NAME="${{ steps.create-dmg.outputs.dmg_name }}"
          ZIP_NAME="${{ steps.create-zip.outputs.zip_name }}"
          shasum -a 256 "$DMG_NAME" > checksums.txt
          shasum -a 256 "$ZIP_NAME" >> checksums.txt
          cat checksums.txt

      - name: Cleanup certificate
        if: always()
        run: |
          echo "Cleaning up keychain..."
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          echo "Certificate cleanup complete"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DMG_NAME="${{ steps.create-dmg.outputs.dmg_name }}"
          ZIP_NAME="${{ steps.create-zip.outputs.zip_name }}"

          gh release upload "$TAG" "$DMG_NAME" "$ZIP_NAME" checksums.txt --clobber

      - name: Release summary
        run: |
          echo "## Release Build Summary 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle Version**: ${{ steps.app-info.outputs.bundle_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle Build**: ${{ steps.app-info.outputs.bundle_build }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Xcode**: $(xcodebuild -version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Swift**: $(swift --version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code signed with Developer ID" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Notarized by Apple" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ready for public distribution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Assets Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- DMG: \`${{ steps.create-dmg.outputs.dmg_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ZIP: \`${{ steps.create-zip.outputs.zip_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
